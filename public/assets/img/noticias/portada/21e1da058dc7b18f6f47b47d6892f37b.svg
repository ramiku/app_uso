<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Imagen estándar de noticia (USO) animada">
  <title>USO · Noticia (placeholder)</title>

  <defs>
    <style>
      :root{
        --uso-red: #E30613;
        --uso-red-strong: rgba(227,6,19,0.22); /* más intenso para fondo */
        --paper: #FFFFFF;
        --paper-2: #F4F6F8;

        --skeleton: rgba(17,17,17,0.16);
        --skeleton-soft: rgba(17,17,17,0.10);

        --shadow: rgba(0,0,0,0.18);
        --stroke: rgba(17,17,17,0.10);
      }

      @keyframes shimmerMove {
        0%   { transform: translateX(-65%); }
        100% { transform: translateX(165%); }
      }
      .shimmer { animation: shimmerMove 1.55s ease-in-out infinite; }

      /* Pulso suave del CTA para hacerlo más vivo */
      @keyframes ctaPulse {
        0%, 100% { transform: translateZ(0) scale(1); filter: saturate(1); }
        50%      { transform: translateZ(0) scale(1.02); filter: saturate(1.08); }
      }
      .ctaPulse { animation: ctaPulse 2.2s ease-in-out infinite; transform-origin: center; }

      @media (prefers-reduced-motion: reduce) {
        .shimmer, .ctaPulse { animation: none; }
      }
    </style>

    <!-- Fondo -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="var(--paper)"></stop>
      <stop offset="1" stop-color="var(--paper-2)"></stop>
    </linearGradient>

    <!-- Brillo -->
    <linearGradient id="shimmerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="rgba(255,255,255,0)"></stop>
      <stop offset="0.45" stop-color="rgba(255,255,255,0.10)"></stop>
      <stop offset="0.55" stop-color="rgba(255,255,255,0.40)"></stop>
      <stop offset="0.65" stop-color="rgba(255,255,255,0.10)"></stop>
      <stop offset="1" stop-color="rgba(255,255,255,0)"></stop>
    </linearGradient>

    <!-- Sombra -->
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="var(--shadow)"></feDropShadow>
    </filter>

    <!-- Clip shimmer: solo líneas + CTA (sin círculo) -->
    <clipPath id="contentClip">
      <rect x="220" y="250" rx="18" ry="18" width="1180" height="56"></rect>
      <rect x="220" y="335" rx="16" ry="16" width="1040" height="44"></rect>
      <rect x="220" y="410" rx="16" ry="16" width="900" height="42"></rect>
      <rect x="220" y="485" rx="16" ry="16" width="760" height="40"></rect>
      <rect x="220" y="585" rx="34" ry="34" width="520" height="78"></rect>
    </clipPath>
  </defs>

  <!-- Fondo base -->
  <rect width="1600" height="900" fill="url(#bgGrad)"></rect>

  <!-- ===== Dos líneas diagonales anchas (más intensas) ===== -->
  <g opacity="0.95">
    <rect x="-420" y="145" width="2440" height="140" fill="var(--uso-red-strong)" transform="rotate(-25 800 450)"></rect>
    <rect x="-420" y="610" width="2440" height="140" fill="var(--uso-red-strong)" transform="rotate(-25 800 450)"></rect>
  </g>

  <!-- Tarjeta principal -->
  <g filter="url(#softShadow)">
    <rect x="140" y="160" width="1320" height="600" rx="34" ry="34" fill="#FFFFFF"></rect>
    <rect x="140" y="160" width="1320" height="600" rx="34" ry="34" fill="none" stroke="var(--stroke)" stroke-width="2"></rect>

    <!-- Línea superior roja -->
    <rect x="140" y="160" width="1320" height="14" rx="7" ry="7" fill="var(--uso-red)"></rect>

    <!-- Líneas (sin círculo) -->
    <rect x="220" y="250" rx="18" ry="18" width="1180" height="56" fill="var(--skeleton)"></rect>
    <rect x="220" y="335" rx="16" ry="16" width="1040" height="44" fill="var(--skeleton-soft)"></rect>
    <rect x="220" y="410" rx="16" ry="16" width="900" height="42" fill="var(--skeleton-soft)"></rect>
    <rect x="220" y="485" rx="16" ry="16" width="760" height="40" fill="var(--skeleton-soft)"></rect>

    <!-- CTA (con pulso sutil) -->
    <g class="ctaPulse">
      <rect x="220" y="585" rx="34" ry="34" width="520" height="78" fill="var(--uso-red)"></rect>
      <text x="480" y="637" text-anchor="middle" font-family="system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="0.5" fill="#FFFFFF">
        COMINICADO USO
      </text>
    </g>
  </g>

  <!-- Shimmer animado sobre el “skeleton” -->
  <g clip-path="url(#contentClip)">
    <g class="shimmer">
      <rect x="-1000" y="120" width="1000" height="700" fill="url(#shimmerGrad)" transform="skewX(-18)"></rect>
    </g>
  </g>

  <!-- Borde exterior -->
  <rect x="18" y="18" width="1564" height="864" rx="28" ry="28" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="2"></rect>
</svg>